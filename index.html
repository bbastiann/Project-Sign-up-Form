<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-Sign-up-Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
            <div class="left-side">
                <div class="odin-card">
                    <img class="odin-logo" src="images/odin-lined.png" alt="">
                    <p class="odin-text">Odin</p>
                </div>
            </div>
            <div class="right-side">

                <div class="welcome-section">
                    <p class="welcome-text"> 
                            This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.
                    </p>
                    <p class="welcome-callout">
   
                            You know you want to.
                    </p>      
                </div>

                <div id="form-container">
                <form action="" method="post"> 
                    <div class="form-white-box">
                        <div class="form-row">
                            <p>Let's do this!</p>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="first-name">First name:</label>
                                <input type="text" id="first-name" name="first-name" value="Thor">
                            </div>
                            
                            <div class="form-group">
                                <label for="last-name">Last name:</label>
                                <input type="text" id="last-name" name="last-name" value="Odison">
                            </div>
                            
                        </div>
                            
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">email:</label>
                                <input type="email" id="email" name="email">
                            </div>
                        
                            <div class="form-group">
                                <label for="phone_number">Phone Number:</label>
                                <input type="number" id="phone-number" name="phone-number">
                            </div>
                            
                        </div>
                        
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="password">Password:</label>
                                <input type="password" id="password" name="password">
                            </div>
                            
                            <div class="form-group">
                                <label for="confirm-password">Confirm Password:</label>
                                <input type="password" id="confirm-password" name="confirm-password">
                            </div>
                        </div> 
                    </div>

                <div class="button-section">
                        <button type="submit" class="button">Create Account</button>
                        <p>Already have and account? <strong>Log In</strong></p>
                </div>
                </form> 
                </div>
               
   
    </div>
   
   
</body>
</html>
