<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-Sign-up-Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page_container">
            <div class="left_side">
                <img class="left_image" src="images/halie-west-25xggax4bSA-unsplash.jpg" alt="">
            </div>
            <div class="right_side">

                <div class="text">
                    <p>
                        This is not a real online service! You know you need something 
                        like this in your life to help you realize your deepest dreams.
                        Sign up now to get started.

                        You know you want to.
                    </p>
                </div>
                <div id="form_container">
                <form action="" method="post"> 
                <div class="form_row">
                    <p>Let's do this!</p>
                </div>
                <div class="form_row">
                    <div class="form_group">
                        <label for="first_name">First name:</label>
                        <input type="text" id="first_name" name="first_name" value="Thor">
                    </div>
                    
                    <div class="form_group">
                        <label for="last_name">Last name:</label>
                        <input type="text" id="last_name" name="last_name" value="Odison">
                    </div>
                    
                </div>
                    
                <div class="form_row">
                    <div class="form_group">
                        <label for="email">email:</label>
                        <input type="email" id="email" name="email">
                    </div>
                
                    <div class="form_group">
                        <label for="phone_number">Phone Number:</label>
                        <input type="number" id="phone_number" name="phone_number">
                    </div>
                    
                </div>
                
                
                <div class="form_row">
                    <div class="form_group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password">
                    </div>
                    
                    <div class="form_group">
                        <label for="confirm_password">Confirm Password:</label>
                        <input type="password" id="confirm_password" name="confirm_password">
                    </div>
                    
                </div>
                
                <!-- Botón -->
                <button type="submit">Create Account</button>
                </form> 
                </div>
   
    </div>
   
   
</body>
</html>
